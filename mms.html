<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>MMS</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── CSS VARIABLES ─── */
:root {
  --bg:#f4f5f7; --surface:#fff; --border:#e4e7ec;
  --text:#111827; --muted:#6b7280; --dim:#c4c9d4;
  --accent:#2563eb; --accent-bg:rgba(37,99,235,.07);
  --red:#dc2626; --red-bg:rgba(220,38,38,.07);
  --green:#16a34a; --amber:#d97706; --purple:#7c3aed;
  --mono:"DM Mono",monospace; --sans:"Noto Sans JP",sans-serif;
  --r:10px; --sh:0 1px 4px rgba(0,0,0,.08); --sh-lg:0 4px 20px rgba(0,0,0,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);display:flex;flex-direction:column;overflow:hidden}

/* ─── TOPBAR ─── */
#topbar{height:50px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;box-shadow:var(--sh);z-index:10}
.logo{font-family:var(--mono);font-size:12px;color:var(--accent);letter-spacing:2px;flex:1}
#sync-status{font-family:var(--mono);font-size:11px;color:var(--accent)}
.top-btn{background:none;border:1px solid var(--border);border-radius:7px;color:var(--muted);padding:5px 10px;font-size:12px;cursor:pointer;font-family:var(--sans);white-space:nowrap;transition:all .15s}
.top-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ─── LAYOUT ─── */
#app-body{display:flex;flex:1;overflow:hidden}
#sidebar{width:192px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ─── SIDEBAR ─── */
.sidebar-section{padding:14px 10px 6px}
.sidebar-label{font-size:10px;font-family:var(--mono);color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;padding:0 4px;margin-bottom:5px}
.sidebar-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 8px;border:none;background:none;border-radius:7px;cursor:pointer;font-family:var(--sans);font-size:13px;color:#374151;font-weight:500;text-align:left;transition:all .12s}
.sidebar-btn:hover{background:#f3f4f6}
.sidebar-btn.active{background:var(--accent-bg);color:var(--accent)}
.sidebar-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-family:var(--mono);padding:1px 5px;border-radius:8px}

/* ─── VIEWS ─── */
.view{display:none;flex:1;flex-direction:column;overflow:hidden}
.view.active{display:flex}
.view-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.view-title{font-size:18px;font-weight:700}
.view-sub{font-size:12px;color:var(--muted);margin-top:2px}
.view-body{flex:1;overflow-y:auto;padding:16px 20px}

/* ─── DASHBOARD ─── */
.hdr-row{display:flex;align-items:center;gap:12px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;padding:16px 20px;flex:1;overflow-y:auto;align-content:start}
.space-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);transition:transform .15s,box-shadow .15s}
.space-card:hover{transform:translateY(-2px);box-shadow:var(--sh-lg)}
.card-head{display:flex;align-items:center;gap:10px;padding:13px 14px;border-bottom:1px solid var(--border);transition:background .12s}
.card-head:hover{background:var(--accent-bg)}
.card-colorbar{width:3px;height:20px;border-radius:2px;flex-shrink:0}
.card-name{font-size:14px;font-weight:700;flex:1;cursor:pointer}
.card-count{font-size:11px;color:var(--muted);font-family:var(--mono)}
.card-plus{width:26px;height:26px;border-radius:6px;background:var(--accent);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-section{padding:10px 14px}
.card-sec-label{font-size:10px;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.card-sec-label.alert{color:var(--red)}
.task-row{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer}
.task-row-nm{font-size:12px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-row-nm.ov{color:var(--red)}
.task-row-days{font-size:10px;font-family:var(--mono);color:var(--red);flex-shrink:0}
.ndot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0}
.card-empty{padding:12px 14px;font-size:12px;color:var(--dim)}

/* ─── CHECKLIST ─── */
#chk-wrap{padding:0 20px;flex-shrink:0}
.chk-toggle{display:flex;align-items:center;gap:8px;padding:10px 0;cursor:pointer;border-bottom:1px solid var(--border);user-select:none}
.chk-lbl{font-size:12px;font-weight:700;color:var(--muted)}
.chk-hint{font-size:11px;color:var(--dim)}
.chk-arrow{margin-left:auto;color:var(--dim);font-size:12px;transition:transform .2s}
#chk-grid{display:flex;flex-wrap:wrap;gap:6px;padding:12px 0 8px}

/* ─── SPACE VIEW ─── */
.sp-hdr{display:flex;align-items:center;gap:10px}
.sp-bar{width:4px;height:26px;border-radius:2px}
.cat-block{margin-bottom:24px}
.cat-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cat-nm{font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.cat-copy{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;transition:all .12s;padding:2px 6px;border-radius:4px}
.cat-copy:hover{background:var(--accent-bg);color:var(--accent)}
.cat-add{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;margin-left:4px;transition:color .12s}
.cat-add:hover{color:var(--accent)}

/* ─── TASK ITEM ─── */
.task-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .15s;box-shadow:var(--sh);margin-bottom:5px}
.task-item:hover{border-color:var(--accent);background:var(--accent-bg)}
.task-chk{width:16px;height:16px;border:1.5px solid var(--border);border-radius:4px;flex-shrink:0;cursor:pointer;transition:all .12s}
.task-chk:hover{border-color:var(--green)}
.task-nm{font-size:13px;flex:1}
.tags-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.tag{font-size:10px;padding:1px 6px;border-radius:4px;font-family:var(--mono);border:1px solid var(--border);color:var(--muted)}
.tag.bad{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.task-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.sbadge{font-size:10px;padding:2px 7px;border-radius:4px;font-family:var(--mono);border:1px solid}
.s-未{border-color:var(--dim);color:var(--muted)}
.s-進行{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.s-要確認{border-color:var(--amber);color:var(--amber)}
.s-確認待ち{border-color:var(--purple);color:var(--purple)}
.s-連絡待ち{border-color:#0891b2;color:#0891b2}
.s-済{border-color:var(--green);color:var(--green)}
.tdl{font-size:10px;font-family:var(--mono);color:var(--muted)}
.tdl.ov{color:var(--red)}

/* ─── ALL TASKS ─── */
.sort-sel{font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);font-family:var(--sans);cursor:pointer}
.g-hdr{font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:1px;padding:14px 0 5px;border-bottom:1px solid var(--border);margin-bottom:8px}

/* ─── LOG ─── */
.log-dg{margin-bottom:20px}
.log-dh{font-size:11px;font-family:var(--mono);color:var(--dim);letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.log-dh::after{content:"";flex:1;height:1px;background:var(--border)}
.log-e{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:4px}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.log-nm{font-size:13px;flex:1}
.log-mood{font-size:16px;cursor:pointer}

/* ─── QUICK BAR ─── */
#quick-bar{padding:10px 20px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;box-shadow:0 -1px 4px rgba(0,0,0,.04)}
.qwrap{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;transition:border-color .15s}
.qwrap:focus-within{border-color:var(--accent)}
.qpfx{font-family:var(--mono);font-size:12px;color:var(--dim);flex-shrink:0}
#quick-input{flex:1;background:none;border:none;outline:none;font-family:var(--sans);font-size:16px;color:var(--text)}
#quick-input::placeholder{color:var(--dim)}
.qhint{font-family:var(--mono);font-size:10px;color:var(--dim);flex-shrink:0}

/* ─── PANEL ─── */
#panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
#panel-overlay.open{opacity:1;pointer-events:all}
#slide-panel{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:96vw;background:var(--surface);border-left:1px solid var(--border);z-index:101;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:var(--sh-lg)}
#slide-panel.open{transform:translateX(0)}
#ptopbar{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
#ptitle{font-size:15px;font-weight:700;flex:1}
.pclose{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.pclose:hover{border-color:var(--red);color:var(--red)}
#pbody{flex:1;overflow-y:auto;padding:18px}
#pactions{display:flex;gap:8px;padding:14px 18px;border-top:1px solid var(--border);flex-shrink:0}
.pfield{margin-bottom:18px}
.plabel{font-size:10px;font-family:var(--mono);color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
.pinput{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:9px 11px;font-size:16px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .15s;resize:none}
.pinput:focus{border-color:var(--accent)}
.tag-grp{display:flex;flex-wrap:wrap;gap:6px}
.tbtn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--mono);transition:all .12s}
.tbtn:hover{border-color:var(--accent);color:var(--accent)}
.tbtn.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.tbtn.on.danger{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.tbtn.on.easy{background:rgba(22,163,74,.08);border-color:var(--green);color:var(--green)}
.divider{height:1px;background:var(--border);margin:6px 0 14px}
.st-row{display:flex;align-items:center;gap:8px;padding:5px 0}
.st-chk{width:14px;height:14px;border:1.5px solid var(--border);border-radius:3px;cursor:pointer;flex-shrink:0;transition:all .12s}
.st-chk.done{background:var(--green);border-color:var(--green)}
.st-lbl{font-size:12px;color:var(--muted);flex:1}
.st-lbl.done{text-decoration:line-through;color:var(--dim)}
.add-st{background:none;border:none;color:var(--dim);font-size:12px;cursor:pointer;font-family:var(--sans);padding:4px 0;transition:color .12s}
.add-st:hover{color:var(--accent)}

/* ─── BUTTONS ─── */
.btn{padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:var(--sans);border:1px solid var(--border);background:none;color:var(--muted);transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.btn-primary:hover{background:#1d4ed8;border-color:#1d4ed8;color:#fff}
.btn-danger:hover{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.btn-complete:hover{border-color:var(--green);color:var(--green)}
.btn-wide{width:100%;text-align:center}
.btn-ai{color:var(--accent);border-color:var(--accent)}
.review-btn{background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;padding:8px 14px;cursor:pointer;font-family:var(--sans);white-space:nowrap;box-shadow:0 2px 8px rgba(37,99,235,.2)}

/* ─── AI POPUP ─── */
#ai-popup{position:fixed;bottom:76px;right:20px;width:300px;background:var(--surface);border:1px solid var(--accent);border-radius:var(--r);padding:14px;z-index:200;box-shadow:0 6px 24px rgba(37,99,235,.15);transform:translateY(16px);opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.4,0,.2,1)}
#ai-popup.show{transform:translateY(0);opacity:1;pointer-events:all}
.aip-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.aip-av{width:24px;height:24px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
.aip-nm{font-size:11px;font-family:var(--mono);color:var(--accent)}
.aip-cls{margin-left:auto;background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px}
.aip-msg{font-size:13px;line-height:1.6;margin-bottom:10px;white-space:pre-wrap}
.aip-acts{display:flex;gap:5px;flex-wrap:wrap}
.aip-btn{padding:4px 9px;border-radius:5px;border:1px solid var(--accent);background:var(--accent-bg);color:var(--accent);font-size:11px;cursor:pointer;font-family:var(--sans);transition:all .12s}
.aip-btn:hover{background:var(--accent);color:#fff}

/* ─── AI CHAT ─── */
#chat-panel{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:96vw;background:var(--surface);border-left:1px solid var(--border);z-index:102;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:var(--sh-lg)}
#chat-panel.open{transform:translateX(0)}
#ctopbar{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
#chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.cmsg{max-width:85%;padding:10px 13px;border-radius:10px;font-size:13px;line-height:1.6;white-space:pre-wrap}
.cmsg.ai{background:#f3f4f6;border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:3px}
.cmsg.user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.cinput-row{display:flex;gap:8px;padding:14px 18px;border-top:1px solid var(--border);flex-shrink:0}
#chat-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:16px;font-family:var(--sans);color:var(--text);outline:none;resize:none;transition:border-color .15s}
#chat-input:focus{border-color:var(--accent)}
#chat-send{background:var(--accent);border:none;border-radius:8px;color:#fff;padding:0 16px;font-size:16px;cursor:pointer}
#chat-send:disabled{background:var(--border);cursor:not-allowed}

/* ─── MODAL ─── */
#modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center}
#modal-ov.open{display:flex}
#modal-box{background:var(--surface);border-radius:var(--r);padding:24px;width:340px;max-width:94vw;box-shadow:0 16px 48px rgba(0,0,0,.15)}
#modal-ttl{font-size:16px;font-weight:700;margin-bottom:8px}
#modal-body{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:18px}
#modal-acts{display:flex;gap:8px;justify-content:flex-end}

/* ─── SPACE PICKER ─── */
#spo{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:flex-end;justify-content:center}
#spo.open{display:flex}
#spbox{background:var(--surface);border-radius:16px 16px 0 0;padding:18px 16px 24px;width:100%;max-width:480px;box-shadow:0 -4px 24px rgba(0,0,0,.12)}
#sp-ttl{font-size:14px;font-weight:700;margin-bottom:12px}
#sp-list{display:flex;flex-direction:column;gap:4px;max-height:50vh;overflow-y:auto}
.sp-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:background .12s;width:100%;text-align:left}
.sp-item:hover{background:var(--bg)}
.sp-cancel{width:100%;margin-top:10px;padding:10px;background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;font-family:var(--sans)}

/* ─── NEXT ACTION ─── */
#nao{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end}
#nao.open{display:flex}
#nabox{background:var(--surface);border-radius:16px 16px 0 0;padding:22px 18px 28px;width:100%;box-shadow:0 -4px 24px rgba(0,0,0,.12)}
#na-prev{font-size:13px;color:var(--muted);margin-bottom:4px}
#na-lbl{font-size:16px;font-weight:700;margin-bottom:14px}
.na-row{display:flex;gap:8px}
#na-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 13px;font-size:16px;font-family:var(--sans);color:var(--text);outline:none}
#na-input:focus{border-color:var(--accent)}
#na-submit{background:var(--accent);border:none;border-radius:8px;color:#fff;padding:0 18px;font-size:15px;cursor:pointer}
#na-skip{width:100%;margin-top:10px;padding:10px;background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;font-family:var(--sans)}

/* ─── BOTTOM TABS ─── */
#bottom-tabs{display:none;background:var(--surface);border-top:1px solid var(--border);box-shadow:0 -2px 10px rgba(0,0,0,.06);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.tabs-row{display:flex}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 4px 5px;background:none;border:none;cursor:pointer;color:#9ca3af;gap:3px;transition:color .15s;position:relative}
.tab-btn.active{color:var(--accent)}
.tab-icon{font-size:19px;line-height:1}
.tab-label{font-size:10px;font-weight:600;font-family:var(--sans)}
.tab-badge{position:absolute;top:5px;right:calc(50% - 17px);background:var(--red);color:#fff;font-size:9px;font-family:var(--mono);padding:1px 4px;border-radius:8px}

/* ─── DRAWER ─── */
#dov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:150}
#dov.open{display:block}
#drawer{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);border-radius:18px 18px 0 0;z-index:151;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:72vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
#drawer.open{transform:translateY(0)}
.drw-handle{display:flex;justify-content:center;padding:10px;cursor:pointer}
.drw-handle::before{content:"";width:36px;height:4px;background:var(--border);border-radius:2px}
.drw-sec{font-size:11px;font-family:var(--mono);color:#9ca3af;letter-spacing:1px;text-transform:uppercase;padding:4px 18px 8px}
.drw-item{display:flex;align-items:center;gap:12px;padding:14px 18px;border:none;background:none;width:100%;text-align:left;cursor:pointer;font-family:var(--sans);font-size:15px;font-weight:500;color:#374151;border-bottom:1px solid var(--border);transition:background .12s}
.drw-item:last-child{border-bottom:none}
.drw-item:hover{background:var(--bg)}
.drw-item.active{color:var(--accent);background:var(--accent-bg)}
.drw-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

<script>
// ============================================================
// 0. GOOGLE CALENDAR SYNC
// ============================================================
// 西岡慎也スペースのIDを名前から動的に取得
function getGcalSpaceId() {
  var sp = db.spaces.find(function(s){
    return s.name.indexOf('西岡') >= 0 || s.id === 'a';
  });
  return sp ? sp.id : 'a';
}
var GCAL_CATEGORY = 'コーディネート';
var GCAL_CALENDAR_ID = 's.nishioka@fashion-stylist.co.jp';
var GCAL_TAG = '__gcal__'; // カレンダー由来タスクのマーカー

// Googleカレンダーからコーディネート予定を取得してMMSに同期
function syncCalendar() {
  var btn = document.getElementById('cal-sync-btn');
  btn.textContent = '⏳';
  btn.disabled = true;

  // Google Calendar REST API（OAuth不要・共有カレンダー）
  var apiKey = 'AIzaSyDALc9hialR10cqtv7vNOOisk6yLO4-sXc';
  var now = new Date();
  var threeMonthsLater = new Date(now);
  threeMonthsLater.setMonth(threeMonthsLater.getMonth() + 3);

  var params = [
    'key=' + apiKey,
    'q=' + encodeURIComponent('コーディネート'),
    'timeMin=' + encodeURIComponent(now.toISOString()),
    'timeMax=' + encodeURIComponent(threeMonthsLater.toISOString()),
    'singleEvents=true',
    'orderBy=startTime',
    'maxResults=50'
  ].join('&');

  var url = 'https://www.googleapis.com/calendar/v3/calendars/'
    + encodeURIComponent(GCAL_CALENDAR_ID)
    + '/events?' + params;

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        // APIキーでは共有カレンダーに認証が必要なため、手動同期モード
        showCalendarSyncModal();
        btn.textContent = '📅'; btn.disabled = false;
        return;
      }
      var events = data.items || [];
      applyCalendarEvents(events);
      btn.textContent = '📅'; btn.disabled = false;
      toast('カレンダー同期完了：' + events.length + '件');
    })
    .catch(function(e) {
      // 手動同期モードにフォールバック
      showCalendarSyncModal();
      btn.textContent = '📅'; btn.disabled = false;
    });
}

// カレンダーイベントをMMSタスクに反映
function applyCalendarEvents(events) {
  // 既存のカレンダー由来タスクを取得
  var existingGcalTasks = db.tasks.filter(function(t) {
    return t.spaceId === getGcalSpaceId() && t.tags.indexOf(GCAL_TAG) >= 0;
  });
  var existingIds = existingGcalTasks.map(function(t) { return t.gcalId; });

  // カレンダーに残っているイベントのID一覧
  var calendarIds = events.map(function(e) { return e.id; });

  // カレンダーから消えたタスクを削除
  db.tasks = db.tasks.filter(function(t) {
    if (t.spaceId !== getGcalSpaceId() || t.tags.indexOf(GCAL_TAG) < 0) return true;
    return calendarIds.indexOf(t.gcalId) >= 0;
  });

  // 新しいイベントをタスクとして追加
  events.forEach(function(ev) {
    if (existingIds.indexOf(ev.id) >= 0) return; // 既にある
    var start = ev.start && (ev.start.dateTime || ev.start.date);
    var deadline = start ? start.slice(0, 10) : '';
    db.tasks.push({
      id: uid(), gcalId: ev.id,
      spaceId: getGcalSpaceId(),
      category: GCAL_CATEGORY,
      title: ev.summary || 'コーディネート',
      detail: start ? '📅 ' + new Date(start).toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '',
      deadline: deadline,
      status: '未',
      tags: [GCAL_TAG],
      metaTags: ['サービス提供'],
      subtasks: [],
      createdAt: todayStr(),
    });
  });

  saveDB();
  refresh();
}

// 手動同期モーダル（Claude経由で同期する場合）
function showCalendarSyncModal() {
  var body = mk('div', {});
  body.innerHTML = '<div style="font-size:13px;line-height:1.7;color:var(--muted)">'
    + 'Claudeに以下を送ると西岡さんのカレンダーからコーディネート予定を取得してMMSに同期します：<br><br>'
    + '<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:var(--mono);font-size:12px;user-select:all;cursor:pointer" onclick="navigator.clipboard.writeText(this.textContent)">'
    + '西岡さんのカレンダーからコーディネート予定を取得してMMSに同期して'
    + '</div><br>'
    + '<div style="font-size:11px;color:var(--dim)">↑ タップでコピー</div>'
    + '</div>';
  var modal = document.getElementById('modal-ov');
  document.getElementById('modal-ttl').textContent = '📅 カレンダー同期';
  document.getElementById('modal-body').innerHTML = '';
  document.getElementById('modal-body').appendChild(body);
  document.getElementById('modal-acts').innerHTML = '';
  var closeBtn = mk('button', {cls:'mbtn', txt:'閉じる'});
  closeBtn.addEventListener('click', function(){ modal.classList.remove('open'); });
  document.getElementById('modal-acts').appendChild(closeBtn);
  modal.classList.add('open');
}

// ============================================================
// 1. FIREBASE REST API
// ============================================================
var FBP = 'task-78c9f';
var FBK = 'AIzaSyDALc9hialR10cqtv7vNOOisk6yLO4-sXc';
var FBU = 'https://firestore.googleapis.com/v1/projects/' + FBP + '/databases/(default)/documents/mms/main';

function fbSave(data) {
  return fetch(FBU + '?key=' + FBK, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({fields: {payload: {stringValue: JSON.stringify(data)}}})
  }).then(function(r) { if (!r.ok) return Promise.reject('HTTP ' + r.status); });
}

function fbLoad() {
  return fetch(FBU + '?key=' + FBK)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d && d.fields && d.fields.payload) return JSON.parse(d.fields.payload.stringValue);
      return null;
    });
}

function fbPoll(cb) {
  var last = '';
  setInterval(function() {
    fbLoad().then(function(d) {
      if (!d) return;
      var s = JSON.stringify(d);
      if (s !== last && last !== '') { last = s; cb(d); }
      else last = s;
    }).catch(function() {});
  }, 30000);
}

// ============================================================
// 2. DATA
// ============================================================
var DB_KEY = 'mms_data';
var CATS = ['営業','マーケ/集客','サービス開発','業務フロー改善','契約','財務','お客様連絡','連絡待ち','確認系','事前準備','サービス提供','スタッフ関連','実務','戦略','その他'];
var SPACES_DEF = [
  {id:'a',name:'A事業',color:'#3b6ff0'},{id:'b',name:'B事業',color:'#e6427a'},
  {id:'c',name:'C事業',color:'#16a34a'},{id:'d',name:'D事業',color:'#d97706'},
  {id:'e',name:'E事業',color:'#7c3aed'},{id:'inbox',name:'受信箱',color:'#6b7280'},
  {id:'priv',name:'プライベート',color:'#0891b2'},{id:'hobby',name:'趣味',color:'#db2777'}
];
var db;

function emptyDB() {
  return {
    settings: {apiKey: '', neglectDays: 2},
    spaces: SPACES_DEF.map(function(s) { return {id:s.id, name:s.name, color:s.color, categories:CATS.slice()}; }),
    tasks: [], logs: []
  };
}

function loadLocal() {
  try { var r = localStorage.getItem(DB_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return emptyDB();
}

function saveLocal() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

function saveDB() {
  saveLocal();
  fbSave(db).catch(function(e) { console.warn('FB save:', e); });
}

// ============================================================
// 3. HELPERS
// ============================================================
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function getSp(id) { return db.spaces.find(function(s) { return s.id === id; }); }
function todayStr() { return new Date().toISOString().slice(0,10); }
function fmtD(iso) { if (!iso) return ''; var d = new Date(iso); return (d.getMonth()+1) + '/' + d.getDate(); }
function daysOv(dl) { if (!dl) return 0; var n = new Date(); n.setHours(0,0,0,0); return Math.floor((n - new Date(dl)) / 86400000); }
function isOv(t) { return t.status !== '済' && daysOv(t.deadline) > 0; }
function isNegl(t) {
  if (t.status === '済') return false;
  var days = (db.settings && db.settings.neglectDays) || 2;
  return Math.floor((new Date() - new Date(t.createdAt)) / 86400000) >= days && t.status === '未';
}

function mk(tag, props, children) {
  var e = document.createElement(tag);
  if (props) Object.keys(props).forEach(function(k) {
    if (k === 'cls') e.className = props[k];
    else if (k === 'css') e.style.cssText = props[k];
    else if (k === 'txt') e.textContent = props[k];
    else if (k.slice(0,2) === 'on') e.addEventListener(k.slice(2), props[k]);
    else e.setAttribute(k, props[k]);
  });
  if (children) children.forEach(function(c) { if (c) e.appendChild(c); });
  return e;
}

function toast(msg) {
  var t = mk('div', {css:'position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;z-index:500;pointer-events:none;transition:opacity .4s', txt:msg});
  document.body.appendChild(t);
  setTimeout(function() { t.style.opacity='0'; setTimeout(function() { t.remove(); }, 400); }, 2500);
}

function syncStatus(msg) { var e = document.getElementById('sync-status'); if (e) e.textContent = msg; }

// ============================================================
// 4. VIEW ROUTING
// ============================================================
var curView = 'dashboard', curSpaceId = null;

function showView(view, spaceId) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.querySelectorAll('.sidebar-btn').forEach(function(b) { b.classList.remove('active'); });
  curView = view; curSpaceId = spaceId || null;
  var map = {dashboard:'view-dashboard',all:'view-all',log:'view-log',settings:'view-settings',space:'view-space'};
  var ve = document.getElementById(map[view]); if (ve) ve.classList.add('active');
  var ne = document.getElementById('snav-'+view); if (ne) ne.classList.add('active');
  if (view === 'dashboard') renderDash();
  else if (view === 'space') renderSpace(spaceId);
  else if (view === 'all') renderAll();
  else if (view === 'log') renderLog();
  else if (view === 'settings') renderSettings();
}

function setTab(id) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  var e = document.getElementById(id); if (e) e.classList.add('active');
}

// ============================================================
// 5. SIDEBAR & DRAWER
// ============================================================
function renderSidebar() {
  var w = document.getElementById('sidebar-spaces'); if (!w) return;
  w.innerHTML = '';
  db.spaces.forEach(function(s) {
    var ov = db.tasks.filter(function(t) { return t.spaceId===s.id && isOv(t); }).length;
    var btn = mk('button', {cls:'sidebar-btn'+(curView==='space'&&curSpaceId===s.id?' active':'')}, [
      mk('span', {cls:'sidebar-dot', css:'background:'+s.color}),
      mk('span', {txt:s.name}),
      ov>0 ? mk('span', {cls:'sidebar-badge', txt:ov}) : null
    ]);
    (function(sid) { btn.addEventListener('click', function() { showView('space',sid); setTab('tab-spaces'); }); })(s.id);
    w.appendChild(btn);
  });
  var tot = db.tasks.filter(function(t) { return isOv(t); }).length;
  var b = document.getElementById('tab-badge');
  if (b) { if (tot>0) { b.textContent=tot; b.style.display=''; } else b.style.display='none'; }
}

function toggleDrawer() {
  var d = document.getElementById('drawer');
  if (d.classList.contains('open')) { closeDrawer(); return; }
  renderDrawer(); d.classList.add('open'); document.getElementById('dov').classList.add('open');
}
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('dov').classList.remove('open'); }

function renderDrawer() {
  var w = document.getElementById('drw-items'); w.innerHTML = '';
  w.appendChild(mk('div', {cls:'drw-sec', txt:'ビュー'}));
  [{lbl:'⊞ 全体俯瞰',v:'dashboard'},{lbl:'📋 全タスク',v:'all'},{lbl:'📓 ログ/日記',v:'log'}].forEach(function(item) {
    var btn = mk('button', {cls:'drw-item'}, [mk('span', {txt:item.lbl})]);
    (function(vv) { btn.addEventListener('click', function() { showView(vv); setTab('tab-dashboard'); closeDrawer(); }); })(item.v);
    w.appendChild(btn);
  });

function renderSpace(sid) {
  var sp = getSp(sid); if (!sp) return;
  document.getElementById('sv-bar').style.background = sp.color;
  document.getElementById('sv-title').textContent = sp.name;
  var stasks = db.tasks.filter(function(t){return t.spaceId===sid&&t.status!=='済';});
  var extras = [];
  stasks.forEach(function(t){ if (CATS.indexOf(t.category)<0 && extras.indexOf(t.category)<0) extras.push(t.category); });
  var allCats = CATS.concat(extras);
  var body = document.getElementById('sv-body'); body.innerHTML = '';
  allCats.forEach(function(cat) {
    var ct = stasks.filter(function(t){return t.category===cat;});
    if (ct.length === 0) return;
    var block = mk('div', {cls:'cat-block'});
    var head = mk('div', {cls:'cat-head'});
    head.appendChild(mk('div', {cls:'cat-nm', txt:cat+' ('+ct.length+')'}));
    // コピーボタン
    var cpb = mk('button', {cls:'cat-copy', txt:'📋'});
    cpb.title = 'クリップボードにコピー';
    (function(c, tasks){
      cpb.addEventListener('click', function(e){
        e.stopPropagation();
        var text = '【'+c+'】\n' + tasks.map(function(t){
          var line = '・' + t.title;
          if (t.deadline) line += ' (' + fmtD(t.deadline) + ')';
          if (t.status !== '未') line += ' [' + t.status + ']';
          if (t.detail) line += '\n  ' + t.detail;
          return line;
        }).join('\n');
        navigator.clipboard.writeText(text).then(function(){
          cpb.textContent = '✓';
          setTimeout(function(){ cpb.textContent = '📋'; }, 1500);
        }).catch(function(){
          // fallback
          var ta = document.createElement('textarea');
          ta.value = text; ta.style.position='fixed'; ta.style.top='-9999px';
          document.body.appendChild(ta); ta.select(); document.execCommand('copy');
          document.body.removeChild(ta);
          cpb.textContent = '✓';
          setTimeout(function(){ cpb.textContent = '📋'; }, 1500);
        });
      });
    })(cat, ct);
    head.appendChild(cpb);
    var ab = mk('button', {cls:'cat-add', txt:'＋'});
    (function(c){ ab.addEventListener('click', function(){ openNew(sid,c); }); })(cat);
    head.appendChild(ab); block.appendChild(head);
    ct.forEach(function(t){ block.appendChild(mkTaskItem(t)); });
    body.appendChild(block);
  });
  // 空のカテゴリを追加するボタン
  var addSec = mk('div', {cls:'cat-block', css:'display:flex;flex-wrap:wrap;gap:6px'});
  CATS.forEach(function(cat) {
    if (stasks.filter(function(t){return t.category===cat;}).length === 0) {
      var btn = mk('button', {css:'font-size:11px;padding:5px 10px;border:1px dashed var(--border);border-radius:6px;background:none;color:var(--dim);cursor:pointer;font-family:var(--sans);margin:2px', txt:'＋ '+cat});
      (function(c){ btn.addEventListener('click', function(){ openNew(sid,c); }); })(cat);
      addSec.appendChild(btn);
    }
  });
  body.appendChild(addSec);
}

function mkTaskItem(t) {
  var item = mk('div', {cls:'task-item'});
  (function(tid){ item.addEventListener('click', function(){ openTask(tid); }); })(t.id);
  var chk = mk('div', {cls:'task-chk'});
  (function(tid){ chk.addEventListener('click', function(e){ e.stopPropagation(); completeTask(tid); }); })(t.id);
  item.appendChild(chk);
  var info = mk('div', {css:'flex:1;min-width:0'});
  info.appendChild(mk('div', {cls:'task-nm', txt:t.title, attr:{data_tid:t.id}}));
  if (t.tags.length>0||t.metaTags.length>0) {
    var tr = mk('div', {cls:'tags-row'});
    t.tags.forEach(function(tag){ tr.appendChild(mk('span', {cls:'tag bad', txt:tag})); });
    t.metaTags.forEach(function(tag){ tr.appendChild(mk('span', {cls:'tag', txt:tag})); });
    info.appendChild(tr);
  }
  item.appendChild(info);
  var meta = mk('div', {cls:'task-meta'});

  if (t.deadline) meta.appendChild(mk('span', {cls:'tdl'+(isOv(t)?' ov':''), txt:fmtD(t.deadline)}));
  item.appendChild(meta);
  return item;
}

// 9. ALL TASKS
// ============================================================
function renderAll() {
  var sort = document.getElementById('all-sort').value;
  var tasks = db.tasks.filter(function(t){return t.status!=='済';});
  document.getElementById('all-cnt').textContent = tasks.length + '件のタスク';
  if (sort==='created') tasks.sort(function(a,b){return b.createdAt.localeCompare(a.createdAt);});
  else if (sort==='deadline') tasks.sort(function(a,b){ if(!a.deadline&&!b.deadline)return 0; if(!a.deadline)return 1; if(!b.deadline)return -1; return a.deadline.localeCompare(b.deadline); });
  else if (sort==='space') tasks.sort(function(a,b){return a.spaceId.localeCompare(b.spaceId);});
  else if (sort==='status') { var ord={'未':0,'進行':1,'確認待ち':2,'連絡待ち':3,'要確認':4}; tasks.sort(function(a,b){return(ord[a.status]||9)-(ord[b.status]||9);}); }
  var body = document.getElementById('all-body'); body.innerHTML = '';
  if (tasks.length===0) { body.appendChild(mk('div', {cls:'empty-state', txt:'タスクなし ✓'})); return; }
  var lastG = null;
  tasks.forEach(function(t) {
    var sp = getSp(t.spaceId);
    var gk = sort==='space'?(sp?sp.name:'不明'):sort==='status'?t.status:sort==='deadline'?(!t.deadline?'期限なし':isOv(t)?'期限切れ':t.deadline.slice(0,7)):t.createdAt.slice(0,7);
    if (gk && gk!==lastG) { body.appendChild(mk('div', {cls:'g-hdr', txt:gk})); lastG=gk; }
    var item = mk('div', {cls:'task-item', css:'margin-bottom:6px'});
    (function(tid){ item.addEventListener('click', function(){ openTask(tid); }); })(t.id);
    if (sp) item.appendChild(mk('div', {css:'width:3px;min-height:36px;border-radius:2px;background:'+sp.color+';align-self:stretch;flex-shrink:0'}));
    var chk = mk('div', {cls:'task-chk'});
    (function(tid){ chk.addEventListener('click', function(e){ e.stopPropagation(); completeTask(tid); }); })(t.id);
    item.appendChild(chk);
    var info = mk('div', {css:'flex:1;min-width:0'});
    info.appendChild(mk('div', {cls:'task-nm', txt:t.title, attr:{data_tid:t.id}}));
    var mr = mk('div', {css:'display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;align-items:center'});
    if (sp) mr.appendChild(mk('span', {css:'font-size:10px;font-family:var(--mono);color:'+sp.color+';border:1px solid '+sp.color+';padding:1px 5px;border-radius:4px', txt:sp.name}));
    mr.appendChild(mk('span', {css:'font-size:10px;color:var(--muted);font-family:var(--mono)', txt:t.category}));
    info.appendChild(mr); item.appendChild(info);
    var meta = mk('div', {cls:'task-meta'});
    meta.appendChild(mk('span', {cls:'sbadge s-'+t.status, txt:t.status}));
    if (t.deadline) meta.appendChild(mk('span', {cls:'tdl'+(isOv(t)?' ov':''), txt:fmtD(t.deadline)}));
    item.appendChild(meta); body.appendChild(item);
  });
}

var curTaskId = null;

function openTask(taskId) {
  var task = db.tasks.find(function(t){return t.id===taskId;}); if (!task) return;
  curTaskId = taskId;
  var sp = getSp(task.spaceId);
  document.getElementById('ptitle').textContent = task.title;

  // Space + status
  var f0 = pf(null);

  if (sp) tr.appendChild(mk('span', {cls:'tag', css:'border-color:'+sp.color+';color:'+sp.color, txt:sp.name}));

  spSel.addEventListener('change', function(){ updateF('spaceId', spSel.value); });

  var f2=pf('期限'); var di=mk('input',{cls:'pinput',type:'date',value:task.deadline||''}); f2.appendChild(di); body.appendChild(f2);

    (function(t){ b.addEventListener('click', function(){ toggleMeta(t); }); })(tag);
    mg.appendChild(b);
  }); f4.appendChild(mg); body.appendChild(f4);

  // ツールバー
  var dtbar = mk('div', {css:'display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap'});

    var hb = mk('button', {txt:h, css:'font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:5px;background:#fff;color:var(--muted);cursor:pointer;font-family:var(--sans)'});
    hb.addEventListener('click', function(){
      dta.value += (dta.value&&!dta.value.endsWith('\n')?'\n':'') + h;

  body.appendChild(mk('div',{cls:'divider'}));

  var f8=pf('AI軍師に相談'); var aib=mk('button',{cls:'btn btn-ai btn-wide',txt:'⚔ このタスクについて相談する'});
  aib.addEventListener('click', function(){ openAIChat(curTaskId); }); f8.appendChild(aib); body.appendChild(f8);

  // Actions
  var pa=document.getElementById('pactions'); pa.innerHTML='';
  var bc=mk('button',{cls:'btn btn-complete',txt:'✓ 完了'});
  (function(tid){ bc.addEventListener('click', function(){ completeTask(tid); }); })(task.id);
  var sp2=mk('div',{css:'flex:1'});
  var bd=mk('button',{cls:'btn btn-danger',txt:'削除'});
  (function(tid){ bd.addEventListener('click', function(){ deleteTask(tid); }); })(task.id);
  var bx=mk('button',{cls:'btn btn-primary',txt:'閉じる'}); bx.addEventListener('click',closePanel);
  pa.appendChild(bc); pa.appendChild(sp2); pa.appendChild(bd); pa.appendChild(bx);

  openPanel();

  setTimeout(function(){
    var pt=document.getElementById('pt-title');
    if(pt){
      pt.addEventListener('input', function(){ updateF('title',pt.value); });
      pt.addEventListener('keydown', function(e){ if(e.key==='Enter'&&!e.isComposing){e.preventDefault();pt.blur();toast('タスク名を更新しました');} });
      pt.focus();
    }
    di.addEventListener('change', function(){ updateF('deadline',di.value); });
    dta.addEventListener('input', function(){ updateF('detail',dta.value); });
  }, 300);

  scheduleAIP(task);
}

function renderST(container, task) {
  container.innerHTML = '';
  (task.subtasks||[]).forEach(function(st) {
    var row=mk('div',{cls:'st-row'});
    var chk=mk('div',{cls:'st-chk'+(st.done?' done':'')});
    (function(sid,tid){

function offlineAI(msg){
  var tasks=db.tasks, NL='\n';
  var ov=tasks.filter(function(t){return isOv(t);}),ne=tasks.filter(function(t){return isNegl(t);});
  var bl=tasks.filter(function(t){return t.tags.indexOf('苦手')>=0||t.tags.indexOf('進め方不明')>=0||t.tags.indexOf('一歩目不明')>=0||t.tags.indexOf('重い')>=0;});
  var easy=tasks.filter(function(t){return t.tags.indexOf('すぐできる')>=0&&t.status!=='済';});
  var wt=tasks.filter(function(t){return t.status==='連絡待ち'||t.status==='確認待ち';});
  if(msg.indexOf('経営全体レビュー')>=0){
    var out='現在の状況分析（AI軍師・オフラインモード）'+NL+NL;
    if(ov.length>0){out+='期限切れ（今すぐ対応）'+NL; ov.forEach(function(t){out+='  ・'+t.title+NL;});}
    if(ne.length>0){out+=NL+'放置中（今週中に動く）'+NL; ne.forEach(function(t){out+='  ・'+t.title+NL;});}
    if(bl.length>0){out+=NL+'ブロック中（一歩目が不明）'+NL; bl.forEach(function(t){out+='  ・'+t.title+NL;});}
    if(wt.length>0){out+=NL+'待ち状態'+NL; wt.forEach(function(t){out+='  ・'+t.title+NL;});}
    if(!ov.length&&!ne.length&&!bl.length) out+='現在、緊急・放置タスクはありません。'+NL;
    out+=NL+'事業別タスク数'+NL;
    db.spaces.forEach(function(s){var c=tasks.filter(function(t){return t.spaceId===s.id;}).length; if(c>0)out+='  '+s.name+': '+c+'件'+NL;});
    out+=NL+'今週の優先アクション（上位3つ）'+NL;
    var pr=ov.concat(ne).concat(bl).slice(0,3);
    if(pr.length>0) pr.forEach(function(t,i){out+=(i+1)+'. '+t.title+NL;}); else out+='緊急タスクなし。新規タスクを入力しましょう。'+NL;
    out+=NL+'Claude APIキーを設定すると、より詳細な分析が得られます。';
    return out;
  }
  var rs=['このタスクの一歩目を具体的に決めましょう。'+NL+'今日5分だけ時間を取るとしたら、何をしますか？','このタスクが止まっている原因は何ですか？'+NL+'①情報不足 ②判断待ち ③苦手意識 ④時間不足'+NL+'どれが一番近いですか？','誰かに依頼または相談できますか？'+NL+'一人で抱え込まず、動ける人を探してみましょう。','このタスクを完了したら、何が変わりますか？'+NL+'ゴールを明確にすると動きやすくなります。'];
  return rs[Math.floor(Math.random()*rs.length)]+NL+NL+'Claude APIキーを設定するとより深い対話ができます。';
}

function sendChat(){
  var input=document.getElementById('chat-input');

  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:chatHist})})

}

  var sx=0,sy=0;
  document.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  document.addEventListener('touchend',function(e){
    if(document.getElementById('slide-panel').classList.contains('open'))return;
    if(document.getElementById('chat-panel').classList.contains('open'))return;
    var dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)<60||Math.abs(dy)>60)return;
    if(dx<0&&curView==='space'){showView('dashboard');setTab('tab-dashboard');}
    if(dx>0&&curView==='dashboard'&&curSpaceId){showView('space',curSpaceId);setTab('tab-spaces');}
  },{passive:true});
})();

document.addEventListener('keydown',function(e){
  if(e.key!=='Escape')return;
  if(document.getElementById('chat-panel').classList.contains('open')){closeAIChat();return;}
  if(document.getElementById('slide-panel').classList.contains('open')){closePanel();return;}
  if(document.getElementById('modal-ov').classList.contains('open')){closeModal();return;}
  if(document.getElementById('spo').classList.contains('open')){closeSP();return;}
  if(document.getElementById('nao').classList.contains('open')){closeNA();}
});

// ============================================================
// 22. REFRESH
// ============================================================
function refresh(){
  renderSidebar();
  if(curView==='dashboard')renderDash();
  else if(curView==='space')renderSpace(curSpaceId);
  else if(curView==='all')renderAll();
  else if(curView==='log')renderLog();
}

// ============================================================
// 23. INIT
// ============================================================
db=loadLocal();
renderSidebar();
renderDash();

syncStatus('🔄 同期中...');
fbLoad().then(function(fireData){
  if(fireData){
    var hasData=(fireData.tasks&&fireData.tasks.length>0)||(fireData.spaces&&fireData.spaces.some(function(s){return s.name!==s.id;}));
    if(hasData){ db=fireData; saveLocal(); refresh(); }
    else if(db.tasks.length>0) fbSave(db).catch(function(){});
  } else {
    fbSave(db).catch(function(){});
  }
  syncStatus('✓ 同期済み');
  setTimeout(function(){syncStatus('');},2000);
  fbPoll(function(remote){
    if((remote.tasks||[]).length>=(db.tasks||[]).length){ db=remote; saveLocal(); refresh(); syncStatus('🔄 同期'); setTimeout(function(){syncStatus('');},2000); }
  });
}).catch(function(e){
  console.warn('FB load:',e);
  syncStatus('⚠ オフライン');
  setTimeout(function(){syncStatus('');},3000);
});

setTimeout(function(){
  var ne=db.tasks.filter(function(t){return isNegl(t)||isOv(t);});
  if(ne.length>0)trigAIP(ne[Math.floor(Math.random()*ne.length)]);
},2000);
</script>
